databaseChangeLog:
  - changeSet:
      id: 017-create-issues-table
      author: eos-team
      changes:
        - createTable:
            tableName: issues
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: issue_type_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: team_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: updated_by
                  type: UUID
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: issues
            baseColumnNames: issue_type_id
            referencedTableName: issue_types
            referencedColumnNames: id
            constraintName: fk_issues_issue_type_id
            onDelete: SET NULL
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: issues
            baseColumnNames: team_id
            referencedTableName: teams
            referencedColumnNames: id
            constraintName: fk_issues_team_id
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: issues
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_issues_created_by
            onDelete: SET NULL
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: issues
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_issues_updated_by
            onDelete: SET NULL
            onUpdate: CASCADE
