databaseChangeLog:
  - changeSet:
      id: 010-create-invalid-tokens
      author: eos
      changes:
        - createTable:
            tableName: invalidated_access_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: jti
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
