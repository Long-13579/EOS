databaseChangeLog:
  - changeSet:
      id: 023-create-index-issues-team-type-created-at-id
      author: eos-team
      changes:
        - createIndex:
            tableName: issues
            indexName: idx_issues_team_type_created_at_id
            columns:
              - column:
                  name: team_id
                  descending: false
              - column:
                  name: issue_type_id
                  descending: false
              - column:
                  name: created_at
                  descending: true
              - column:
                  name: id
                  descending: false
