databaseChangeLog:
  - changeSet:
      id: 024-replace-index-issues-team-type-created-at-id
      author: eos-team
      changes:
        - dropIndex:
            indexName: idx_issues_team_type_created_at_id
            tableName: issues

        - createIndex:
            tableName: issues
            indexName: idx_issues_team_type_is_archived_created_at_id
            columns:
              - column:
                  name: team_id
                  descending: false
              - column:
                  name: issue_type_id
                  descending: false
              - column:
                  name: is_archived
              - column:
                  name: created_at
                  descending: true
              - column:
                  name: id
                  descending: false
