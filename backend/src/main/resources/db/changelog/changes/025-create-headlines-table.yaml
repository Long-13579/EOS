databaseChangeLog:
  - changeSet:
      id: 025-create-headlines-table
      author: eos-team
      changes:
        - createTable:
            tableName: headlines
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: team_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: updated_by
                  type: UUID
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: headlines
            baseColumnNames: team_id
            referencedTableName: teams
            referencedColumnNames: id
            constraintName: fk_headlines_team_id
            onDelete: RESTRICT
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: headlines
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_headlines_created_by
            onDelete: RESTRICT
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: headlines
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_headlines_updated_by
            onDelete: SET NULL
            onUpdate: CASCADE
