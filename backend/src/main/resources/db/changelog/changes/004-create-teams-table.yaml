databaseChangeLog:
  - changeSet:
      id: 004-create-teams-table
      author: eos-team
      changes:
        - createTable:
            tableName: teams
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: updated_by
                  type: UUID
                  constraints:
                    nullable: true
