databaseChangeLog:
  - changeSet:
      id: 040-create-metrics-table
      author: eos-team
      changes:
        - createTable:
            tableName: metrics
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: goal
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: unit
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: operator
                  type: VARCHAR(50)
                  constraints:
                    nullable: true
              - column:
                  name: team_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: updated_by
                  type: UUID
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: metrics
            baseColumnNames: team_id
            referencedTableName: teams
            referencedColumnNames: id
            constraintName: fk_metrics_team_id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            baseTableName: metrics
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_metrics_owner_id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            baseTableName: metrics
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_metrics_created_by
            onDelete: SET NULL
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            baseTableName: metrics
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_metrics_updated_by
            onDelete: SET NULL
            onUpdate: CASCADE
