databaseChangeLog:
  - changeSet:
      id: 033-create-quarters-table
      author: eos-team
      changes:
        - createTable:
            tableName: quarters
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: start_date
                  type: VARCHAR(5)
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: VARCHAR(5)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: updated_by
                  type: UUID
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: quarters
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_quarters_created_by
            onDelete: SET NULL
        - addForeignKeyConstraint:
            baseTableName: quarters
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_quarters_updated_by
            onDelete: SET NULL
