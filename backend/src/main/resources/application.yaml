spring:
  application:
    name: backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:backend}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jackson:
    default-property-inclusion: non_null
server:
  port: ${SERVER_PORT:8080}
google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000      # 15 minutes in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds
cookie:
  http-only: true
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

azure:
  openai:
    endpoint: ${AZURE_OPENAI_ENDPOINT}
    api-key: ${AZURE_OPENAI_API_KEY}
    deployment-id: ${AZURE_OPENAI_DEPLOYMENT_ID}
    timeout: ${AZURE_OPENAI_TIMEOUT:30}
    max-tokens: ${AZURE_OPENAI_MAX_TOKENS:1000}
    temperature: ${AZURE_OPENAI_TEMPERATURE:0.7}
