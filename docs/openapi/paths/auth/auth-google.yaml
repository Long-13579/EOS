post:
  tags:
    - Authentication
  summary: User Login via Google SSO
  description: Authenticates the user via Google OAuth and returns the user's data
  operationId: authGoogle
  security: []
  requestBody:
    $ref: ../../components/request-bodies/login-google.yaml#/LoginGoogleRequest
  responses:
    "200":
      description: Login successful
      headers:
        Set-Cookie:
          description: |
            HTTP-only authentication cookie.
            Sets the access_token and refresh_token cookies used for authentication.
          schema:
            type: string
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/message-response.yaml#/MessageResponse
          example: 
            message: Login successfully.
    "400":
      description: Invalid code
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/error-response.yaml#/ErrorResponse
          example:
            code: INVALID_CODE
            message: The authorization code is invalid or has expired.
    "401":
      description: Unauthorized - Login failed (User not found or invalid credentials).
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/common/error-response.yaml#/ErrorResponse
          example:
            code: AUTHENTICATION_FAILED
            message: "Login failed. Please ensure your account is registered."
    "500":
      $ref: ../../components/responses/internal-server-error.yaml#/InternalServerErrorResponse
