post:
  tags:
    - Rocks
  summary: Create a new rock
  description: Creates a new rock within the specified team.
  operationId: createRock
  security:
    - accessCookieAuth: []
  requestBody:
    $ref: ../../components/request-bodies/create-rock.yaml#/CreateRockRequestBody
  responses:
    "201":
      description: Rock created successfully.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/rock/rock-response.yaml#/RockResponse
    "400":
      $ref: ../../components/responses/bad-request.yaml#/BadRequestResponse
    "401":
      $ref: ../../components/responses/unauthorized.yaml#/UnauthorizedResponse
    "403":
      $ref: ../../components/responses/forbidden.yaml#/ForbiddenResponse
    "404":
      $ref: ../../components/responses/not-found.yaml#/NotFoundResponse
    "409":
      $ref: ../../components/responses/conflict.yaml#/ConflictResponse
    "422":
      $ref: ../../components/responses/validation-error.yaml#/ValidationErrorResponse
    "500":
      $ref: ../../components/responses/internal-server-error.yaml#/InternalServerErrorResponse

get:
  tags:
    - Rocks
  summary: Retrieve rocks for a team
  description: Retrieves rocks for a specific team, grouped by category. Requires authentication.
  operationId: getRocks
  security:
    - accessCookieAuth: []
  parameters:
    - $ref: ../../components/parameters/team.yaml#/TeamIdQueryParam
    - $ref: ../../components/parameters/quarter.yaml#/QuarterIdQueryParam
    - $ref: ../../components/parameters/year.yaml#/YearIdQueryParam
    - $ref: ../../components/parameters/is-archived.yaml#/IsArchivedQueryParam
  responses:
    "200":
      description: Successfully retrieved rocks for the team, grouped by category.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/rock/rock-list-response.yaml#/RockListResponse
    "400":
      $ref: ../../components/responses/bad-request.yaml#/BadRequestResponse
    "401":
      $ref: ../../components/responses/unauthorized.yaml#/UnauthorizedResponse
    "403":
      $ref: ../../components/responses/forbidden.yaml#/ForbiddenResponse
    "404":
      $ref: ../../components/responses/not-found.yaml#/NotFoundResponse
    "500":
      $ref: ../../components/responses/internal-server-error.yaml#/InternalServerErrorResponse
