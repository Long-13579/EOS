get:
  tags:
    - Todos
  summary: List todos by team
  description: Retrieves a paginated list of todos for a specific team. Requires authentication.
  operationId: listTodosByTeam
  security:
    - accessCookieAuth: []
  parameters:
    - $ref: ../../components/parameters/page.yaml#/PageParam
    - $ref: ../../components/parameters/limit.yaml#/LimitParam
    - $ref: ../../components/parameters/team.yaml#/TeamIdQueryParam
    - $ref: ../../components/parameters/todo.yaml#/TodoStatusQueryParam
    - $ref: ../../components/parameters/todo.yaml#/TodoArchiveQueryParam
  responses:
    "200":
      description: List of todos by team
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/todo/todo-list-response.yaml#/TodoListResponse
    "400":
      $ref: ../../components/responses/bad-request.yaml#/BadRequestResponse
    "401":
      $ref: ../../components/responses/unauthorized.yaml#/UnauthorizedResponse
    "403":
      $ref: ../../components/responses/forbidden.yaml#/ForbiddenResponse
    "404":
      $ref: ../../components/responses/not-found.yaml#/NotFoundResponse
    "500":
      $ref: ../../components/responses/internal-server-error.yaml#/InternalServerErrorResponse

post:
  operationId: createTodo
  summary: Create a new to-do
  description: Creates a new to-do item within the specified team.
  tags:
    - Todos
  security:
    - accessCookieAuth: []
  requestBody:
    $ref: ../../components/request-bodies/create-todo.yaml#/CreateTodoRequestBody
  responses:
    "201":
      description: To-do successfully created.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/todo/todo-response.yaml#/TodoResponse
    "400":
      $ref: ../../components/responses/bad-request.yaml#/BadRequestResponse
    "401":
      $ref: ../../components/responses/unauthorized.yaml#/UnauthorizedResponse
    "403":
      $ref: ../../components/responses/forbidden.yaml#/ForbiddenResponse
    "409":
      $ref: ../../components/responses/conflict.yaml#/ConflictResponse
    "422":
      $ref: ../../components/responses/validation-error.yaml#/ValidationErrorResponse
    "500":
      $ref: ../../components/responses/internal-server-error.yaml#/InternalServerErrorResponse
