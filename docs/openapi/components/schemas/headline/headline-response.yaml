HeadlineResponse:
  allOf:
    - $ref: ./headline-base.yaml#/HeadlineBase
    - type: object
      description: Detailed schema for a headline response
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the headline
          readOnly: true
          example: "123e4567-e89b-12d3-a456-426614174000"
        isArchived:
          type: boolean
          description: Indicates whether the headline is archived.
          example: false
        createdAt:
          type: string
          format: date-time
          description: Date and time when the headline was created
          readOnly: true
          example: "2026-02-24T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Date and time when the headline was last updated
          readOnly: true
          example: "2026-02-24T12:30:00Z"
        createdBy:
          $ref: ../user/user-base-response.yaml#/UserBaseResponse
        updatedBy:
          $ref: ../user/user-base-response.yaml#/UserBaseResponse
        team:
          $ref: ../team/team-base.yaml#/TeamBase
      required:
        - id
        - isArchived
        - createdBy
        - createdAt
