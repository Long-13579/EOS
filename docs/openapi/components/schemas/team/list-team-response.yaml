        updatedBy: 9c9f6c44-1b2f-4f52-b1c2-6a8a4b9c1234
    pagination:
      page: 1
      limit: 10
      totalItems: 3
      totalPages: 1
      hasNext: false
      hasPrev: false
  required:
    - data
    - pagination
