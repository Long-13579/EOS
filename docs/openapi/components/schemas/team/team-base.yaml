TeamBase:
  type: object
  description: Team entity
  properties:
    id:
      type: string
      format: uuid
      description: Unique identifier of the team
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    name:
      type: string
      description: Name of the team. Must not be empty or contain leading/trailing whitespace.
      minLength: 1
      maxLength: 100
      pattern: "^[a-zA-ZÀ-ỹ0-9]+(?:[ \\-\\'][a-zA-ZÀ-ỹ0-9]+)*$"
      example: Engineering Team

  required:
    - id
    - name
