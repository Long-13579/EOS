MetricOperatorEnum:
  type: string
  description: |
    The operator to apply when evaluating the metric.
    - LESS_THAN: The metric value must be less than the target value.
    - LESS_THAN_OR_EQUAL_TO: The metric value must be less than or equal to the target value.
    - GREATER_THAN: The metric value must be greater than the target value.
    - GREATER_THAN_OR_EQUAL_TO: The metric value must be greater than or equal to the target value.
    - EQUAL_TO: The metric value must exactly match the target value.
  enum:
    - LESS_THAN
    - LESS_THAN_OR_EQUAL_TO
    - GREATER_THAN
    - GREATER_THAN_OR_EQUAL_TO
    - EQUAL_TO
  example: GREATER_THAN
