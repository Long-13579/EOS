BadRequestResponse:
  description: Bad Request - The request payload is malformed or contains invalid structure.
  content:
    application/json:
      schema:
        $ref: ../../openapi.yaml#/components/schemas/ErrorResponse
      example:
        code: BAD_REQUEST
        message: Request payload is invalid.
        details:
          body:
            - Field 'email' must be a valid email format.
            - Field 'firstName' must not be empty.
